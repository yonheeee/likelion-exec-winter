<!DOCTYPE html>
<html>
<head>
  <title>로그인</title>
  <link rel="stylesheet" type="text/css" href="signin.css">
</head>
<body>
  <div class="login-container">
    <h2>로그인</h2>
    
    <form>
      <label for="username">아이디:</label>
      <input type="text" id="username" name="username" required><br><br>
    
      <label for="password">비밀번호:</label>
      <input type="password" id="password" name="password" required><br><br>
  
      <input type="button" value="로그인" id="loginbutton" onclick="goToCalendarPage()"> 
      <button id="signup-button">회원가입</button>
    </form>
    
  </div>
  
  <!-- 모달 -->
  <div id="signup-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div class="signup-title">
        <i class="fas fa-user-plus"></i>
        <h3>회원 가입</h3>
      </div>
      <form id="signup-form">
        <label for="signup-username">아이디 :</label>
        <input type="text" id="signup-username" name="signup-username" required><br><br>
        
        <label for="signup-password">비밀번호 :</label>
        <input type="password" id="signup-password" name="signup-password" required><br><br>
        
        <label for="signup-confirm-password">비밀번호 확인 :</label>
        <input type="password" id="signup-confirm-password" name="signup-confirm-password" required><br><br>
        
    

        <input type="submit" value="회원 가입">
      </form>
    </div>
  </div>
  <script  src="signin.js"></script>
</body>
</html>
